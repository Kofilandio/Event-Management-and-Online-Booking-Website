services:
  postgres:
    image: postgres:16-alpine
    container_name: tedi-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tedi
    ports:
      - "5432:5432"
    volumes:
      - tedi-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tedi"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  tedi-pg-data:
